# Sample input for `aidr score-delegation`.
#
# A short list of business judgments scored against the delegation matrix.
# Each entry needs the per-question answers for both axes, keyed by the
# full item id from definitions/delegation-matrix.yaml:
#   verifiability:        verifiability.V1, verifiability.V2, verifiability.V3
#   answer_definability:  answer_definability.A1, answer_definability.A2, answer_definability.A3

judgments:
  - id: receipt_mandatory_items_check
    description: Verify that a receipt has all statutory items (date, payee, amount, issuer)
    answers: { verifiability.V1: yes, verifiability.V2: yes, verifiability.V3: yes, answer_definability.A1: yes, answer_definability.A2: yes, answer_definability.A3: yes }

  - id: invoice_scheme_compliance
    description: Check that a receipt meets the invoice scheme (適格請求書) requirements
    answers: { verifiability.V1: yes, verifiability.V2: yes, verifiability.V3: yes, answer_definability.A1: yes, answer_definability.A2: yes, answer_definability.A3: yes }

  - id: entertainment_expense_judgment
    description: Decide whether an expense falls under the tax category of entertainment expenses
    answers: { verifiability.V1: yes, verifiability.V2: yes, verifiability.V3: no,  answer_definability.A1: yes, answer_definability.A2: yes, answer_definability.A3: no }

  - id: new_hire_decision
    description: Make a final hiring decision after an interview
    answers: { verifiability.V1: no,  verifiability.V2: no,  verifiability.V3: no,  answer_definability.A1: no,  answer_definability.A2: no,  answer_definability.A3: no  }

  - id: discriminatory_language_detection
    description: Decide whether an internal document contains discriminatory expressions
    answers: { verifiability.V1: yes, verifiability.V2: yes, verifiability.V3: no,  answer_definability.A1: no,  answer_definability.A2: no,  answer_definability.A3: yes }

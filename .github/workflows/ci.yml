# SHA pinned actions per the OSS hardening checklist.
# Workflow-wide permissions default to read-only; jobs only escalate when needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # pyproject is the single source of truth; this pulls the pinned
        # overlay-scoring-skeleton engine from PyPI (must be published first).
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Smoke test the CLI
        run: |
          bin/aidr --help
          bin/aidr validate-audit-log examples/audit-log-sample.json --level extended
          bin/aidr check-overlay examples/overlays/sample-company/extra-rules.yaml

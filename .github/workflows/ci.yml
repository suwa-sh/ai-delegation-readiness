# SHA pinned actions per the OSS hardening checklist.
# Workflow-wide permissions default to read-only; jobs only escalate when needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # pyproject is the single source of truth; this pulls the pinned
        # overlay-scoring-skeleton engine from PyPI (must be published first).
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Smoke test the CLI
        run: |
          bin/aidr --help
          bin/aidr validate-audit-log examples/audit-log-sample.json --level extended
          bin/aidr check-overlay examples/overlays/sample-company/extra-rules.yaml
